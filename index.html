<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOURNAMENT BD</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#5B3DF0;--bg:#F4F4F7;--card:#FFFFFF;--danger:#EF4444}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif}
body{background:var(--bg);padding-bottom:80px}
.login-box{width:90%;max-width:420px;margin:80px auto;background:var(--card);padding:30px;border-radius:18px;box-shadow:0 10px 40px rgba(91,61,240,0.12)}
.input{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:1px solid #E5E5E5}
.btn{padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;width:100%;font-weight:700;margin-bottom:10px}
.header{background:var(--card);padding:14px 18px;display:flex;justify-content:space-between;position:sticky;top:0}
.page{display:none;padding:18px}.page.active{display:block}
.slider{display:flex;overflow-x:auto;gap:12px}.slide{min-width:90%}.slide img{width:100%;height:160px;border-radius:16px;object-fit:cover}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cat-card{background:var(--card);border-radius:14px;text-align:center}.cat-card img{width:100%;height:110px;border-radius:14px 14px 0 0;object-fit:cover}
.match-card{background:var(--card);padding:16px;border-radius:14px;margin-bottom:14px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:8px 0}
.nav-item{text-align:center;font-size:11px;color:#999}.nav-item.active{color:var(--primary);font-weight:700}
.badge{background:#EF4444;color:#fff;padding:2px 6px;border-radius:10px;font-size:11px} /* এইটা নতুন */
</style>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage"><div class="login-box">
<h2 style="text-align:center;color:var(--primary)">TOURNAMENT BD</h2>
<input type="number" class="input" id="userNumber" placeholder="মোবাইল নাম্বার">
<input type="password" class="input" id="userPass" placeholder="পাসওয়ার্ড">
<button class="btn" onclick="login()">Login / Register</button>
</div></div>

<div id="mainApp" style="display:none;">
<div class="header"><div style="color:var(--primary);font-weight:800">TOURNAMENT BD</div>
<div style="background:#EEEBFF;color:var(--primary);padding:8px 14px;border-radius:20px">💼 <span id="userBalance">0</span> BDT</div></div>

<div id="home" class="page active">
<div id="adminNotice" style="background:#FFFBEA;padding:12px;border-radius:8px;margin-bottom:15px"></div>
<div class="slider" id="sliderArea"></div>
<div style="font-weight:700;margin:18px 0">⊞ ক্যাটাগরি</div>
<div class="cat-grid" id="catArea"></div>
</div>

<div id="matches" class="page"><div id="matchList"></div></div>

<div id="profile" class="page">
  <h3 id="profileName">Name</h3>
  <button class="btn" onclick="sendSupportTicket()">🎧 Support</button>  <!-- নতুন -->
  <button class="btn" onclick="openInbox()">📩 Inbox <span id="msgCount" class="badge">0</span></button> <!-- নতুন -->
  <button class="btn" onclick="logout()" style="background:var(--danger)">Logout</button>
</div>

<nav class="bottom-nav">
<div class="nav-item active" onclick="showPage('home',this)">🏠<br>Home</div>
<div class="nav-item" onclick="showPage('matches',this)">🎮<br>Match</div>
<div class="nav-item" onclick="showPage('profile',this)">👤<br>Profile</div>
</nav>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDQCtTrLR8duNg7Ux_5D9BM0SRV5aukVIE",
  authDomain: "tournament-bd-63fd9.firebaseapp.com",
  databaseURL: "https://tournament-bd-63fd9-default-rtdb.firebaseio.com",
  projectId: "tournament-bd-63fd9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let CURRENT_USER = null;

function login(){
  let num=userNumber.value; let pass=userPass.value;
  if(!num || !pass) return alert("সব Fill করুন");
  db.ref('users/'+num).once('value').then(snap=>{
    if(!snap.exists()){
      db.ref('users/'+num).set({name:"User"+num, pass:pass, balance:100, id:"BD"+Date.now()});
    }
    let user=snap.val()||{name:"User"+num,pass:pass,balance:100};
    if(user.pass==pass){CURRENT_USER=user; CURRENT_USER.number=num; loginPage.style.display='none'; mainApp.style.display='block'; loadData();}
    else alert("ভুল পাসওয়ার্ড");
  });
}
function logout(){CURRENT_USER=null; mainApp.style.display='none'; loginPage.style.display='block';}
function showPage(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active')}

function loadData(){
  profileName.innerText = CURRENT_USER.name;
  db.ref('users/'+CURRENT_USER.number+'/balance').on('value',snap=>{userBalance.innerText=snap.val()});
  db.ref('appData/slider').on('value',snap=>{let s=snap.val()||[]; sliderArea.innerHTML=s.map(x=>`<div class="slide"><img src="${x.img}"></div>`).join('')});
  db.ref('appData/categories').on('value',snap=>{let c=snap.val()||[]; catArea.innerHTML=c.map(x=>`<div class="cat-card"><img src="${x.img}"><p>${x.name}</p></div>`).join('')});
  db.ref('appData/notice').on('value',snap=>{adminNotice.innerText=snap.val()||"স্বাগতম!"});
  db.ref('appData/matches').on('value',snap=>{let m=snap.val()||[]; matchList.innerHTML=m.map(x=>`<div class="match-card"><b>${x.name}</b><p>Entry: ${x.entry} | Prize: ${x.prize}</p></div>`).join('')});

  // INBOX COUNT
  db.ref('adminMessages/'+CURRENT_USER.number).on('value', s=>{
    document.getElementById('msgCount').innerText = s.numChildren();
  });
}

// SUPPORT + INBOX FUNCTIONS
function sendSupportTicket(){
  let problem = prompt("আপনার সমস্যা লিখুন");
  if(problem){
    db.ref('supportTickets').push({
      name: CURRENT_USER.name, id: CURRENT_USER.number, msg: problem, time: new Date().toLocaleString()
    });
    alert("✅ Admin এর কাছে Ticket গেছে");
  }
}
function openInbox(){
  db.ref('adminMessages/'+CURRENT_USER.number).once('value').then(s=>{
    let msgs = ""; s.forEach(x=>{ msgs += x.val().time + "\n" + x.val().msg + "\n\n" });
    alert("📩 Admin Messages:\n\n" + (msgs || "কোনো Message নেই"));
    db.ref('adminMessages/'+CURRENT_USER.number).remove();
  });
}
</script><script src="script.js"></script>
</body></html>
